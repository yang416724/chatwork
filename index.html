<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>论文修改助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Segoe UI', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: #f4f7fb;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      touch-action: manipulation;
    }
    .container {
      width: 100%;
      max-width: 600px;
      height: 95vh;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .config-bar {
      padding: 12px 14px;
      background: #f9fbfd;
      border-bottom: 1px solid #e9edf2;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .config-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .config-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1 1 0;
      min-width: 0;
    }
    .config-group label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #5e6f7d;
      letter-spacing: 0.3px;
    }
    .config-group input, .config-group select {
      padding: 8px 10px;
      border: 1px solid #dce3ea;
      border-radius: 8px;
      font-size: 0.8rem;
      background: #fff;
      width: 100%;
    }
    .model-row {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }
    .model-row .config-group {
      flex: 1;
    }
    .fetch-btn {
      background: #2b7a62;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.75rem;
      white-space: nowrap;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .prompt-area {
      padding: 10px 14px;
      background: #f0f4f3;
      border-bottom: 1px solid #dcebe4;
    }
    .prompt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .prompt-header span {
      font-size: 0.75rem;
      font-weight: 600;
      color: #2b4b3a;
    }
    .prompt-header button {
      background: none;
      border: 1px solid #b7cdc2;
      color: #2b4b3a;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
    }
    textarea#systemPrompt {
      width: 100%;
      border: 1px solid #cbdcd3;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.8rem;
      background: #fff;
      resize: vertical;
      min-height: 55px;
      max-height: 80px;
      font-family: inherit;
    }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #ffffff;
    }
    .message {
      display: flex;
      gap: 6px;
      max-width: 90%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #eef2f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .message.user .avatar { background: #2b7a62; color: white; }
    .message.assistant .avatar { background: #f0dfce; color: #5e4630; }
    .bubble {
      background: #f1f4f9;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble { background: #dff1eb; }
    .input-row {
      padding: 10px 14px;
      border-top: 1px solid #e9edf2;
      display: flex;
      gap: 8px;
      background: #f9fbfd;
      align-items: flex-end;
    }
    #userInput {
      flex: 1;
      border: 1px solid #dce3ea;
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 0.85rem;
      resize: none;
      font-family: inherit;
      background: #fff;
      max-height: 100px;
    }
    #sendBtn {
      background: #2b7a62;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 10px 18px;
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    #sendBtn:disabled { background: #b7cdc2; }
    .loading-dots { display: flex; gap: 4px; padding: 2px 0; }
    .loading-dots span {
      width: 5px; height: 5px;
      background: #8795a1;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }
    .status-bar {
      font-size: 0.65rem;
      color: #7c8b98;
      padding: 6px 14px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="config-bar">
    <div class="config-row">
      <div class="config-group">
        <label>🔗 API 地址</label>
        <input type="text" id="apiBase" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
      </div>
      <div class="config-group">
        <label>🔑 API 密钥</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
    </div>
    <div class="model-row">
      <div class="config-group">
        <label>🧠 模型</label>
        <select id="modelSelect">
          <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
        </select>
      </div>
      <button class="fetch-btn" id="fetchModelsBtn">📋 拉取模型</button>
    </div>
  </div>

  <div class="prompt-area">
    <div class="prompt-header">
      <span>📝 系统提示词</span>
      <button id="resetPromptBtn">恢复默认</button>
    </div>
    <textarea id="systemPrompt">你是一名资深学术论文修改专家，擅长中英文论文的润色、逻辑优化和学术表达提升。请根据用户提供的论文段落进行修改，保持原意不变，提升语言流畅度、学术严谨性和结构清晰度。</textarea>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message assistant">
      <div class="avatar">🤖</div>
      <div class="bubble">你好！我是论文修改助手，可以直接把需要润色的段落粘贴过来。</div>
    </div>
  </div>

  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="输入论文内容..."></textarea>
    <button id="sendBtn">发送</button>
  </div>
  <div class="status-bar" id="statusBar">⚡ 就绪</div>
</div>

<script>
  (function() {
    const apiBaseInput = document.getElementById('apiBase');
    const apiKeyInput = document.getElementById('apiKey');
    const modelSelect = document.getElementById('modelSelect');
    const fetchBtn = document.getElementById('fetchModelsBtn');
    const systemPromptArea = document.getElementById('systemPrompt');
    const resetPromptBtn = document.getElementById('resetPromptBtn');
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusBar = document.getElementById('statusBar');

    const DEFAULT_PROMPT = systemPromptArea.value;
    let conversationHistory = [{ role: "system", content: DEFAULT_PROMPT }];

    function setStatus(text, error = false) {
      statusBar.textContent = text;
      statusBar.style.color = error ? '#c0392b' : '#7c8b98';
    }

    function appendMessage(role, content) {
      const msg = document.createElement('div');
      msg.className = `message ${role}`;
      msg.innerHTML = `<div class="avatar">${role === 'user' ? '👤' : '🤖'}</div><div class="bubble">${escapeHtml(content)}</div>`;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendLoading() {
      const msg = document.createElement('div');
      msg.className = 'message assistant';
      msg.id = 'loadingMsg';
      msg.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeLoading() {
      const el = document.getElementById('loadingMsg');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updateSystemPrompt() {
      if (conversationHistory[0]?.role === 'system') {
        conversationHistory[0].content = systemPromptArea.value;
      } else {
        conversationHistory.unshift({ role: "system", content: systemPromptArea.value });
      }
    }

    systemPromptArea.addEventListener('input', updateSystemPrompt);
    resetPromptBtn.addEventListener('click', () => {
      systemPromptArea.value = DEFAULT_PROMPT;
      updateSystemPrompt();
      setStatus('已恢复默认提示词');
    });

    // 拉取模型
    fetchBtn.addEventListener('click', async () => {
      const base = apiBaseInput.value.trim().replace(/\/+$/, '');
      const key = apiKeyInput.value.trim();
      if (!key) {
        setStatus('请先填写 API 密钥', true);
        return;
      }
      setStatus('正在拉取模型...');
      fetchBtn.disabled = true;
      try {
        const res = await fetch(`${base}/models`, {
          headers: { 'Authorization': `Bearer ${key}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const models = data.data || [];
        modelSelect.innerHTML = '';
        if (models.length === 0) {
          modelSelect.innerHTML = '<option value="">无可用模型</option>';
        } else {
          models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.id;
            modelSelect.appendChild(opt);
          });
        }
        setStatus(`已加载 ${models.length} 个模型`);
      } catch(e) {
        setStatus(`拉取失败: ${e.message}`, true);
      } finally {
        fetchBtn.disabled = false;
      }
    });

    // 发送消息
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      const base = apiBaseInput.value.trim().replace(/\/+$/, '');
      const key = apiKeyInput.value.trim();
      const model = modelSelect.value;
      if (!key) { setStatus('缺少 API 密钥', true); return; }
      if (!model) { setStatus('请选择模型', true); return; }

      updateSystemPrompt();
      appendMessage('user', text);
      conversationHistory.push({ role: "user", content: text });
      userInput.value = '';
      userInput.style.height = 'auto';

      sendBtn.disabled = true;
      appendLoading();
      setStatus('生成中...');

      try {
        const res = await fetch(`${base}/chat/completions`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${key}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: model,
            messages: conversationHistory,
            temperature: 0.7
          })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `请求失败 (${res.status})`);
        }
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || '(空回复)';
        removeLoading();
        appendMessage('assistant', reply);
        conversationHistory.push({ role: "assistant", content: reply });
        setStatus('就绪');
      } catch(e) {
        removeLoading();
        appendMessage('assistant', `⚠️ ${e.message}`);
        setStatus(e.message, true);
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
    });

    setStatus('就绪，点击「拉取模型」获取可用模型');
  })();
</script>
</body>
</html>
